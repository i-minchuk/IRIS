version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iris_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${REGISTRY}/${IMAGE_NAME}-backend:${TAG}
    container_name: iris_staging_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      IRIS_STORAGE_ROOT: /app/storage
      IRIS_LOG_LEVEL: INFO
    volumes:
      - staging_storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${REGISTRY}/${IMAGE_NAME}-frontend:${TAG}
    container_name: iris_staging_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  staging_postgres_data:
  staging_storage_data:
