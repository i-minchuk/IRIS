name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint backend and frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: ./.github/actions/python-deps
      - uses: ./.github/actions/frontend-install
      - name: Compile backend
        run: python -m compileall project-root/backend
      - name: Security scan with safety
        run: |
          pip install safety
          safety check -r project-root/backend/requirements.txt

  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python: [3.12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: ./.github/actions/python-deps
      - name: Run pytest
        working-directory: project-root/backend
        run: python -m pytest -q -m 'not integration' --cov=app --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./project-root/backend/coverage.xml
          flags: backend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docker-build

  integration:
    name: Run integration tests
    runs-on: ubuntu-latest
    needs: test
    services:
      db:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iris_test
        options: >
          --health-cmd="pg_isready -U postgres -d iris_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/iris_test
      SECRET_KEY: iris-secret-key-test-only
      IRIS_STORAGE_ROOT: /tmp/iris_test_storage
      IRIS_LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: ./.github/actions/python-deps
      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d iris_test && break
            sleep 2
          done
      - name: Run migrations
        working-directory: project-root/backend
        run: alembic upgrade head
      - name: Run integration tests
        working-directory: project-root/backend
        run: python -m pytest -q -m integration
