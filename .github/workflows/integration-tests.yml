name: Integration Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: iris_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - name: Run migrations
        env:
          DB_DSN: postgresql://test:test@localhost:5432/iris_test
          SECRET_KEY: test-secret-key
        run: |
          python -m db.migrations_runner

      - name: Run integration tests
        env:
          DB_DSN: postgresql://test:test@localhost:5432/iris_test
          SECRET_KEY: test-secret-key
          DISABLE_CACHE: "true"
        run: |
          pytest tests/test_integration.py tests/test_migrations.py -v --tb=short -m integration

      - name: Run E2E smoke test
        env:
          DB_DSN: postgresql://test:test@localhost:5432/iris_test
          SECRET_KEY: test-secret-key
          DISABLE_CACHE: "true"
        run: |
          python tests/test_e2e_smoke.py
