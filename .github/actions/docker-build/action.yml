name: Docker Build
description: Build ДокПоток IRIS Docker images
runs:
  using: composite
  steps:
    - name: Build backend image
      shell: bash
      run: docker build -f Dockerfile.backend -t dokpotok-iris-backend:latest .

    - name: Build frontend image
      shell: bash
      run: docker build -f Dockerfile.frontend -t dokpotok-iris-frontend:latest .
