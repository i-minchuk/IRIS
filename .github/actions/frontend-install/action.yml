name: Install frontend dependencies
description: Install frontend packages for ДокПоток IRIS
runs:
  using: composite
  steps:
    - name: Cache npm packages
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('project-root/frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Cache frontend node_modules
      uses: actions/cache@v4
      with:
        path: project-root/frontend/node_modules
        key: ${{ runner.os }}-frontend-node-modules-${{ hashFiles('project-root/frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-frontend-node-modules-

    - name: Install frontend dependencies
      shell: bash
      run: npm ci
      working-directory: project-root/frontend
