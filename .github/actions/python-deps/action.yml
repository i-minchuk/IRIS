name: Install Python dependencies
description: Install Python dependencies for ДокПоток IRIS
runs:
  using: composite
  steps:
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('project-root/backend/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip

    - name: Install requirements
      shell: bash
      run: python -m pip install -r project-root/backend/requirements.txt
