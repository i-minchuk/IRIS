# Docker Compose для Production
# Запуск: docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iris_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-iris}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${DB_NAME:-iris}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iris_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iris} -d ${DB_NAME:-iris}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iris_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-iris}:${DB_PASSWORD:-change_me_in_production}@db:5432/${DB_NAME:-iris}
      SECRET_KEY: ${SECRET_KEY:-CHANGE_THIS_IN_PRODUCTION_MIN_32_CHARS}
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["http://localhost:5173","http://localhost:3000","http://127.0.0.1:5173"]}
      IRIS_LOG_LEVEL: INFO
      DB_USER: ${DB_USER:-iris}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      DB_NAME: ${DB_NAME:-iris}
      BACKUP_DIR: /app/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iris_network
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/logs:/app/logs
      - ./backend/backups:/app/backups
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-"http://localhost:5173/api","http://localhost:3000/api","http://127.0.0.1:5173/api"}
    container_name: iris_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - iris_network

  nginx:
    image: nginx:alpine
    container_name: iris_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
    depends_on:
      - backend
      - frontend
    networks:
      - iris_network

  redis:
    image: redis:7-alpine
    container_name: iris_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - iris_network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  iris_network:
    driver: bridge
